kind = "web"
previewPath = "/"
title = "Instagram Analyzer Bot"
version = "1.0.0"
id = "artifacts/instagram-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20527
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/instagram-bot run dev"

[services.env]
PORT = "20527"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/instagram-bot", "run", "build"]
publicDir = "artifacts/instagram-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
